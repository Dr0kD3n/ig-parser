name: Auto Update Build

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run Build Script
        run: .\build.bat # This generates the 'dist' folder
        
      - name: Create Update Package
        run: |
          # Remove persistent files from dist for the update package
          Remove-Item -Path "dist\config\database.sqlite" -ErrorAction SilentlyContinue
          Remove-Item -Path "dist\data" -Recurse -ErrorAction SilentlyContinue
          Remove-Item -Path "dist\install.bat" -ErrorAction SilentlyContinue
          # Create zip targeting ONLY the updateable files
          Compress-Archive -Path "dist\*" -DestinationPath "ig-bot-update.zip"
          
      - name: Update Latest Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          name: Latest Build
          tag_name: latest
          files: ig-bot-update.zip
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Create Tagged Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: ig-bot-update.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
